<div class="threshold-form-container">
  <div *ngIf="selectedAssetId == null" class="no-selection">
    <mat-icon>tune</mat-icon>
    <p>Select an asset to configure thresholds</p>
  </div>

  <div *ngIf="selectedAssetId != null && readonly" class="no-selection">
    <mat-icon>visibility</mat-icon>
    <p>Viewer access: thresholds are read-only</p>
  </div>

  <form *ngIf="selectedAssetId != null" [formGroup]="form" (ngSubmit)="save()" class="threshold-form">
    <div class="form-field-group">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>RMS Max (g)</mat-label>
        <input matInput type="number" formControlName="rmsMax" step="0.1" min="0.1">
        <mat-icon matPrefix class="field-icon rms-icon">vibration</mat-icon>
        <mat-hint>Current: {{ threshold?.rmsMax ?? '—' }} g</mat-hint>
        <mat-error *ngIf="form.get('rmsMax')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="form.get('rmsMax')?.hasError('min')">Must be > 0</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Temp Max (°C)</mat-label>
        <input matInput type="number" formControlName="tempMax" step="0.5" min="1">
        <mat-icon matPrefix class="field-icon temp-icon">thermostat</mat-icon>
        <mat-hint>Current: {{ threshold?.tempMax ?? '—' }}°C</mat-hint>
        <mat-error *ngIf="form.get('tempMax')?.hasError('required')">Required</mat-error>
        <mat-error *ngIf="form.get('tempMax')?.hasError('min')">Must be > 0</mat-error>
      </mat-form-field>
    </div>

    <button *ngIf="!readonly" mat-raised-button color="accent" type="submit"
            [disabled]="form.invalid || saving"
            class="save-btn">
      <mat-icon *ngIf="!saving">save</mat-icon>
      <mat-progress-spinner *ngIf="saving" diameter="18" mode="indeterminate"></mat-progress-spinner>
      {{ saving ? 'Saving…' : 'Save Thresholds' }}
    </button>
  </form>
</div>
