<div class="asset-list-container">
  <mat-form-field appearance="outline" class="filter-field">
    <mat-label>Search Assets</mat-label>
    <input matInput (keyup)="applyFilter($event)" placeholder="e.g. MOTOR-101" [value]="filterValue">
    <mat-icon matSuffix>search</mat-icon>
  </mat-form-field>

  <div class="table-wrapper">
    <table mat-table [dataSource]="dataSource" class="assets-table">

      <ng-container matColumnDef="assetName">
        <th mat-header-cell *matHeaderCellDef>Asset</th>
        <td mat-cell *matCellDef="let asset">
          <span class="asset-name">{{ asset.assetName }}</span>
          <span class="asset-location">{{ asset.location }}</span>
        </td>
      </ng-container>

      <ng-container matColumnDef="location">
        <th mat-header-cell *matHeaderCellDef>Location</th>
        <td mat-cell *matCellDef="let asset">{{ asset.location }}</td>
      </ng-container>

      <ng-container matColumnDef="status">
        <th mat-header-cell *matHeaderCellDef>Status</th>
        <td mat-cell *matCellDef="let asset">
          <span [class]="getStatusClass(asset.status)">
            {{ getStatusLabel(asset.status) }}
          </span>
        </td>
      </ng-container>

      <ng-container matColumnDef="action">
        <th mat-header-cell *matHeaderCellDef>View</th>
        <td mat-cell *matCellDef="let asset">
          <button mat-icon-button color="accent"
                  [class.active-asset]="asset.id === selectedAssetId"
                  (click)="selectAsset(asset)"
                  matTooltip="View readings">
            <mat-icon>analytics</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"
          [class.selected-row]="row.id === selectedAssetId"
          (click)="selectAsset(row)"></tr>
    </table>

    <div *ngIf="dataSource.filteredData.length === 0" class="no-data">
      <mat-icon>search_off</mat-icon>
      <p>No assets found</p>
    </div>
  </div>
</div>
