spring.datasource.url=jdbc:mysql://localhost:3306/predictive_maintenance?serverTimezone=UTC&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Keep the MySQL schema in sync without clearing existing dashboard data.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# BUG FIX: Disable open-in-view to prevent lazy-loading issues outside transactions
spring.jpa.open-in-view=false

# Do not rerun data.sql on every backend startup. That script truncates tables,
# which would erase assets added from the dashboard.
spring.sql.init.mode=never
spring.sql.init.schema-locations=classpath:schema.sql
spring.sql.init.data-locations=classpath:data.sql
spring.sql.init.continue-on-error=true

server.port=9090

logging.level.com.predictive=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# BUG FIX: Configure Jackson to handle LocalDateTime serialization properly
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
